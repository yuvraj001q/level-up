<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Level Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f; color: #e0e0e0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #888; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-block; padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: #fff; border: none; border-radius: 12px;
      font-size: 1rem; cursor: pointer; text-decoration: none;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Connect to the internet to access the latest data. Previously visited pages are still available.</p>
    <a class="btn" onclick="window.history.back()">Go Back</a>
  </div>
</body>
</html>
