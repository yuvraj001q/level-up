name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: Sync Capacitor
        run: npx cap copy

      - name: Test shell
        run: echo "hello world" && pwd && ls -la

      - name: Build APK
        run: |
          echo "Step started"
          ls -la $GITHUB_WORKSPACE/android/gradlew
          ls -la $GITHUB_WORKSPACE/android/
          cd $GITHUB_WORKSPACE/android
          ./gradlew assembleDebug
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: level-up-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk