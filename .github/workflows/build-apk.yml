name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Sync Capacitor
        run: npx cap copy

      - name: Debug build
        run: |
          set -x
          pwd
          ls -la android/
          file android/gradlew
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug 2>&1 || true
        shell: bash

      - name: Check APK
        run: |
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK output found"
        shell: bash

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: level-up-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk