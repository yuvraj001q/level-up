name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Debug environment
        run: |
          echo "Java: $(java -version 2>&1)"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la /usr/local/lib/android/sdk/ 2>/dev/null || echo "No android SDK at default path"
          ls -la $ANDROID_HOME/cmdline-tools/ 2>/dev/null || echo "No cmdline-tools"
          which gradle 2>/dev/null || echo "No gradle in PATH"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Sync Capacitor
        run: npx cap copy

      - name: Build APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: level-up-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        run: |
          gh release delete latest --yes --repo ${{ github.repository }} 2>/dev/null || true
          gh release create latest --repo ${{ github.repository }} --title "Latest Build" --notes "Auto-built from commit ${{ github.sha }}" android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}