name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps & build Next.js
        run: |
          npm ci
          npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install SDK 36 components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-36" 2>&1 | tail -5
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses 2>&1 | tail -5

      - uses: gradle/actions/setup-gradle@v4

      - name: Sync Capacitor
        run: npx cap copy

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon
        shell: bash
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: level-up-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: success()
        run: |
          gh release delete latest --yes --repo ${{ github.repository }} 2>/dev/null || true
          gh release create latest --repo ${{ github.repository }} --title "Latest Build" --notes "Auto-built from commit ${{ github.sha }}" android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}