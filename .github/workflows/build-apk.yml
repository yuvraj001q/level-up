name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          cd /tmp
          curl -sLo gradle.zip https://services.gradle.org/distributions/gradle-8.13.0-bin.zip
          unzip -q gradle.zip
          echo "/tmp/gradle-8.13.0/bin" >> $GITHUB_PATH

      - name: Sync Capacitor
        run: npx cap copy

      - name: Build APK
        run: |
          cd android
          gradle assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: level-up-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk