name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap copy

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/level-up.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: level-up-apk
          path: android/app/build/outputs/apk/debug/level-up.apk

      - name: Upload APK to Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          commit: ${{ github.sha }}
          replacesArtifacts: true
          allowUpdates: true
          omitBody: true
          omitPrereleaseDuringPublication: true
          artifacts: android/app/build/outputs/apk/debug/level-up.apk
          token: ${{ secrets.GITHUB_TOKEN }}
